name: Build Ubuntu Autoinstall ISO

on:
  workflow_dispatch:
    inputs:
      ubuntu_iso_url:
        description: "URL исходного Ubuntu Server ISO"
        required: false
        default: "https://releases.ubuntu.com/26.04/ubuntu-26.04-live-server-amd64.iso"
      ubuntu_iso_sha256:
        description: "SHA256 исходного Ubuntu Server ISO"
        required: false
        default: "dec49008a71f6098d0bcfc822021f4d042d5f2db279e4d75bdd981304f1ca5d9"
  push:
    branches: [main, master]
    paths:
      - "config/user-data.template"
      - "config/packages.yaml"
      - "config/meta-data"
      - "src/build-autoinstall-iso.sh"

env:
  DEFAULT_ISO_URL: "https://releases.ubuntu.com/26.04/ubuntu-26.04-live-server-amd64.iso"
  DEFAULT_ISO_SHA256: "dec49008a71f6098d0bcfc822021f4d042d5f2db279e4d75bdd981304f1ca5d9"

jobs:
  download-iso:
    runs-on: ubuntu-latest
    outputs:
      iso_filename: ${{ steps.iso.outputs.filename }}
      iso_sha256: ${{ steps.iso.outputs.sha256 }}

    steps:
      - name: Resolve ISO URL
        id: iso
        run: |
          url="${{ github.event.inputs.ubuntu_iso_url || env.DEFAULT_ISO_URL }}"
          sha256="${{ github.event.inputs.ubuntu_iso_sha256 || env.DEFAULT_ISO_SHA256 }}"
          filename="$(basename "$url")"
          echo "url=$url"           >> "$GITHUB_OUTPUT"
          echo "filename=$filename" >> "$GITHUB_OUTPUT"
          echo "sha256=$sha256"     >> "$GITHUB_OUTPUT"

      - name: Cache Ubuntu ISO
        id: cache-iso
        uses: actions/cache@v4
        with:
          path: ubuntu-source.iso
          key: iso-${{ steps.iso.outputs.sha256 }}

      - name: Download Ubuntu Server ISO
        if: steps.cache-iso.outputs.cache-hit != 'true'
        run: |
          echo "Скачиваем: ${{ steps.iso.outputs.url }}"
          wget --progress=dot:giga -O ubuntu-source.iso "${{ steps.iso.outputs.url }}"

      - name: Verify ISO checksum
        if: steps.cache-iso.outputs.cache-hit != 'true'
        run: |
          echo "${{ steps.iso.outputs.sha256 }} *ubuntu-source.iso" | sha256sum --check

  prepare-userdata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gettext-base

      - name: Validate secrets
        env:
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          missing=()
          [[ -z "$ADMIN_PASSWORD_HASH" ]] && missing+=("ADMIN_PASSWORD_HASH")
          [[ -z "$SSH_PUBLIC_KEY" ]]      && missing+=("SSH_PUBLIC_KEY")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Не заданы обязательные секреты: ${missing[*]}"
            echo "Добавь их в Settings → Secrets and variables → Actions"
            exit 1
          fi

      - name: Generate user-data from template
        env:
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          envsubst '$ADMIN_PASSWORD_HASH $SSH_PUBLIC_KEY' \
            < config/user-data.template \
            > user-data

      - name: Inject packages list
        uses: mikefarah/yq@master
        with:
          cmd: yq eval -i '.autoinstall.packages = load("config/packages.yaml")' user-data

      - name: Upload user-data artifact
        uses: actions/upload-artifact@v4
        with:
          name: user-data
          path: user-data
          retention-days: 1

  build-iso:
    runs-on: ubuntu-latest
    needs: [download-iso, prepare-userdata]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y xorriso p7zip-full

      - name: Restore Ubuntu ISO from cache
        id: cache-iso
        uses: actions/cache@v4
        with:
          path: ubuntu-source.iso
          key: iso-${{ needs.download-iso.outputs.iso_sha256 }}

      - name: Download Ubuntu Server ISO (fallback)
        if: steps.cache-iso.outputs.cache-hit != 'true'
        run: |
          url="${{ github.event.inputs.ubuntu_iso_url || env.DEFAULT_ISO_URL }}"
          wget --progress=dot:giga -O ubuntu-source.iso "$url"

      - name: Download user-data artifact
        uses: actions/download-artifact@v4
        with:
          name: user-data

      - name: Build autoinstall ISO
        env:
          OUT_ISO: ubuntu-autoinstall.iso
          USER_DATA: ./user-data
          META_DATA: ./config/meta-data
        run: |
          chmod +x src/build-autoinstall-iso.sh
          ./src/build-autoinstall-iso.sh ubuntu-source.iso

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-autoinstall-${{ github.run_number }}
          path: ubuntu-autoinstall.iso
          retention-days: 14
          compression-level: 0
